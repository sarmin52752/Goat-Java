<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaGoat | Zihad Ahmed</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg-body: #0a0a00; --bg-sidebar: #14140a; --bg-card: #1f1f0f;
            --bg-input: #1a1a0e; --border: #2a2a1a; --accent: #F59E0B;
            --text-main: #f3f4f6; --text-muted: #a8a29e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Goat Animation */
        .goat-anim {
            font-size: 80px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            margin-bottom: 20px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        #auth-screen { position: fixed; inset: 0; background: var(--bg-body); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-card { background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border); width: 90%; max-width: 400px; }
        .auth-btn { width: 100%; padding: 12px; margin-top: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google { background: white; color: #333; }
        .btn-guest { background: #2a2a1a; color: white; border: 1px solid var(--border); }
        
        #app-container { display: flex; height: 100vh; }
        #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; }
        #main-content { flex: 1; display: flex; flex-direction: column; }
        #chat-area { flex: 1; overflow-y: auto; padding: 2rem; }
        .input-container { padding: 1.5rem; border-top: 1px solid var(--border); }
        .input-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: 15px; padding: 1rem; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; resize: none; font-family: inherit; }
        .send-btn { background: var(--accent); color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .msg { margin-bottom: 20px; padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.6; }
        .msg.user { background: var(--accent); color: black; align-self: flex-end; margin-left: auto; }
        .msg.ai { background: var(--bg-card); border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="goat-anim">🐐</div>
            <h1 style="font-family: 'Syne'; margin-bottom: 10px;">JavaGoat</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Welcome, Zihad Ahmed</p>
            <button class="auth-btn btn-google" id="google-login">Sign in with Google</button>
            <button class="auth-btn btn-guest" id="guest-login">Continue as Guest</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <aside id="sidebar">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">🐐 JavaGoat</h2>
            <button id="new-chat" style="background: var(--accent); padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold;">+ New Chat</button>
            <div id="history" style="flex: 1; margin-top: 20px; color: var(--text-muted);">History (Login needed)</div>
            <button id="logout" style="background: none; border: none; color: var(--text-muted); cursor: pointer; text-align: left;">Logout</button>
        </aside>
        <main id="main-content">
            <div id="chat-area"></div>
            <div class="input-container">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Ask Zihad Ahmed AI..."></textarea>
                    <div class="send-btn" id="send-msg"><span class="material-symbols-rounded">arrow_upward</span></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC2B3Q_70GdJkNrKurwZdL6cV0hqR6-FWk",
          authDomain: "javagoat-5577b.firebaseapp.com",
          databaseURL: "https://javagoat-5577b-default-rtdb.firebaseio.com",
          projectId: "javagoat-5577b",
          storageBucket: "javagoat-5577b.firebasestorage.app",
          messagingSenderId: "1075784144310",
          appId: "1:1075784144310:web:ce9a334592bab5ec371d17"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const OPENROUTER_KEY = "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";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('google-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('guest-login').onclick = () => signInAnonymously(auth);
        document.getElementById('logout').onclick = () => signOut(auth);

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini",
                        messages: [{role: "user", content: text}]
                    })
                });
                const data = await res.json();
                chatArea.innerHTML += `<div class="msg ai">${data.choices[0].message.content}</div>`;
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {
                alert("Check Internet or API Key");
            }
        }

        document.getElementById('send-msg').onclick = sendMessage;
    </script>
</body>
</html>
